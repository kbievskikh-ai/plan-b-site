<head>

<style>
:root{--bg:#0a0f1e;--card:#111827;--card2:#1a2332;--accent:#6366f1;--accent2:#8b5cf6;--gold:#d4af37;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--border:#1e293b;--success:#059669;--warning:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}

/* Header */
.hero{text-align:center;padding:60px 20px 40px;background:linear-gradient(135deg,#0a0f1e 0%,#1a1040 50%,#0a0f1e 100%)}
.hero h1{font-size:2.5rem;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,#6366f1,#a78bfa,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:1.1rem;max-width:600px;margin:0 auto 30px}
.stats-row{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-top:24px}
.stat{text-align:center}
.stat-num{font-size:2rem;font-weight:800;color:var(--accent)}
.stat-label{font-size:.85rem;color:var(--muted)}

/* Language Toggle */
.lang-toggle{position:fixed;top:16px;right:16px;z-index:999;display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px}
.lang-btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;background:transparent;color:var(--muted);transition:.2s}
.lang-btn.active{background:var(--accent);color:#fff}

/* Procedure Selector */
.section-title{font-size:1.3rem;font-weight:700;margin:30px 0 16px;display:flex;align-items:center;gap:10px}
.procedure-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:30px}
.proc-btn{padding:14px 12px;background:var(--card);border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:.3s;font-size:.85rem;color:var(--text)}
.proc-btn:hover{border-color:var(--accent);transform:translateY(-2px)}
.proc-btn.active{border-color:var(--accent);background:rgba(99,102,241,.15);box-shadow:0 0 20px rgba(99,102,241,.2)}
.proc-btn .emoji{font-size:1.8rem;display:block;margin-bottom:6px}
.proc-btn .label{font-weight:600;font-size:.8rem}
.proc-btn .us-price{color:var(--muted);font-size:.75rem;margin-top:4px}

/* USA Benchmark */
.usa-benchmark{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.usa-benchmark .flag{font-size:2rem}
.usa-benchmark .info{flex:1}
.usa-benchmark .label{font-size:.85rem;color:var(--muted)}
.usa-benchmark .price{font-size:2rem;font-weight:800;color:var(--red)}

/* Results */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.country-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.3s;position:relative;overflow:hidden}
.country-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(99,102,241,.15)}
.country-card.best{border-color:var(--green);box-shadow:0 0 25px rgba(16,185,129,.15)}
.country-card.best::after{content:"BEST VALUE";position:absolute;top:12px;right:-30px;background:var(--green);color:#fff;font-size:.65rem;font-weight:700;padding:3px 35px;transform:rotate(45deg)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.card-header .flag{font-size:1.8rem}
.card-header .name{font-size:1.1rem;font-weight:700}
.card-header .jci{background:rgba(16,185,129,.15);color:var(--green);font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:auto}
.price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.price-row .price{font-size:1.8rem;font-weight:800;color:var(--green)}
.price-row .savings{font-size:1rem;font-weight:700;color:var(--green);background:rgba(16,185,129,.12);padding:4px 10px;border-radius:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.detail-item{background:var(--card2);padding:8px 10px;border-radius:8px;font-size:.8rem}
.detail-item .dlabel{color:var(--muted);font-size:.7rem;margin-bottom:2px}
.hospitals{margin-top:12px;font-size:.8rem}
.hospitals .hl{color:var(--muted);font-size:.7rem;margin-bottom:4px}
.hosp-tag{display:inline-block;background:var(--card2);padding:3px 8px;border-radius:6px;font-size:.72rem;margin:2px 2px;color:var(--text)}

/* Savings Bar */
.savings-bar{height:6px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
.savings-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width .5s}

/* Sort */
.sort-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sort-btn{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.2s}
.sort-btn:hover,.sort-btn.active{color:var(--text);border-color:var(--accent);background:rgba(99,102,241,.1)}

/* CTA */
.cta-section{text-align:center;padding:60px 20px;margin-top:40px;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.05));border-radius:20px}
.cta-section h2{font-size:1.8rem;font-weight:800;margin-bottom:12px}
.cta-section p{color:var(--muted);margin-bottom:24px}
.cta-btn{display:inline-block;padding:14px 40px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;border-radius:12px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:.3s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.4)}

/* Footer */
.footer{text-align:center;padding:30px;color:var(--muted);font-size:.75rem;border-top:1px solid var(--border);margin-top:40px}

/* Mobile */
@media(max-width:640px){
.hero h1{font-size:1.6rem}
.procedure-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.results-grid{grid-template-columns:1fr}
.usa-benchmark{flex-direction:column;text-align:center}
.stats-row{gap:20px}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.country-card{animation:fadeIn .4s ease-out both}
.country-card:nth-child(2){animation-delay:.05s}
.country-card:nth-child(3){animation-delay:.1s}
.country-card:nth-child(4){animation-delay:.15s}
.country-card:nth-child(5){animation-delay:.2s}
.country-card:nth-child(6){animation-delay:.25s}

img.emoji{height:1em;width:1em;margin:0 .05em 0 .1em;vertical-align:-0.1em}
.proc-btn img.emoji,.card-header img.emoji,.usa-benchmark img.emoji{height:1.8em;width:1.8em}
.stat img.emoji{height:1em;width:1em}
</style>

function setLang(l){
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.querySelectorAll('.i18n').forEach(el => {
    const v = el.dataset[l];
    if(v) el.textContent = v;
  });
  if(selectedProc) renderResults();
  renderProcedures();
  twemoji.parse(document.body);
}

function renderProcedures(){
  const grid = document.getElementById('procGrid');
  grid.innerHTML = '';
  for(const [name, proc] of Object.entries(DATA.procedures)){
    const btn = document.createElement('div');
    btn.className = 'proc-btn' + (selectedProc === name ? ' active' : '');
    const label = lang === 'ru' ? (PROC_LABELS_RU[name] || name) : name.replace(/ \(.*\)/, '');
    btn.innerHTML = `<span class="emoji">${PROC_EMOJIS[name]||'🏥'}</span><div class="label">${label}</div><div class="us-price">USA: $${proc.usaPrice.toLocaleString()}</div>`;
    btn.onclick = () => { selectedProc = name; renderProcedures(); renderResults(); };
    grid.appendChild(btn);
  }
  twemoji.parse(grid);
}

function renderResults(){
  const section = document.getElementById('resultsSection');
  section.style.display = 'block';
  const proc = DATA.procedures[selectedProc];
  
  // USA benchmark
  const usaDiv = document.getElementById('usaBenchmark');
  usaDiv.innerHTML = `<span class="flag">🇺🇸</span><div class="info"><div class="label">${lang==='en'?'USA Average Price':'Средняя цена в США'}</div><div class="price">$${proc.usaPrice.toLocaleString()}</div></div>`;
  twemoji.parse(usaDiv);
  
  // Sort countries
  let entries = Object.entries(proc.countries);
  if(currentSort === 'price') entries.sort((a,b) => a[1].price - b[1].price);
  else if(currentSort === 'savings') entries.sort((a,b) => parseInt(b[1].savings) - parseInt(a[1].savings));
  else if(currentSort === 'jci') entries.sort((a,b) => (b[1].jci?1:0) - (a[1].jci?1:0) || a[1].price - b[1].price);
  else if(currentSort === 'wait') entries.sort((a,b) => {
    const wa = parseInt(a[1].waitTime); const wb = parseInt(b[1].waitTime);
    return wa - wb || a[1].price - b[1].price;
  });
  
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';
  const cheapest = Math.min(...entries.map(e => e[1].price));
  
  entries.forEach(([country, info], i) => {
    const card = document.createElement('div');
    card.className = 'country-card' + (info.price === cheapest ? ' best' : '');
    card.style.animationDelay = (i * 0.05) + 's';
    const savingsNum = parseInt(info.savings);
    const savedAmount = proc.usaPrice - info.price;
    
    card.innerHTML = `
      <div class="card-header">
        <span class="flag">${FLAGS[country]||'🌍'}</span>
        <span class="name">${country}</span>
        ${info.jci ? '<span class="jci">✓ JCI</span>' : ''}
      </div>
      <div class="price-row">
        <span class="price">$${info.price.toLocaleString()}</span>
        <span class="savings">-${info.savings}</span>
      </div>
      <div style="font-size:.8rem;color:var(--muted)">${lang==='en'?'You save':'Экономия'}: <strong style="color:var(--green)">$${savedAmount.toLocaleString()}</strong></div>
      <div class="savings-bar"><div class="savings-bar-fill" style="width:${savingsNum}%"></div></div>
      <div class="detail-grid">
        <div class="detail-item"><div class="dlabel">${lang==='en'?'Wait Time':'Ожидание'}</div>${info.waitTime}</div>
        <div class="detail-item"><div class="dlabel">${lang==='en'?'Accreditation':'Аккредитация'}</div>${info.jci?'JCI ✅':'Local'}</div>
      </div>
      <div class="hospitals">
        <div class="hl">${lang==='en'?'Top Hospitals':'Лучшие клиники'}:</div>
        ${info.topHospitals.map(h => `<span class="hosp-tag">${h}</span>`).join('')}
      </div>`;
    grid.appendChild(card);
  });
  twemoji.parse(grid);
  section.scrollIntoView({behavior:'smooth', block:'start'});
}

function sortBy(sort, btn){
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(selectedProc) renderResults();
}

// Init
renderProcedures();
twemoji.parse(document.body);
</script>
</body>
</html>
