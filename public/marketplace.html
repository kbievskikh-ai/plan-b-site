const USD_RATE = 5.20;

function parsePrice(priceStr) {
  if (!priceStr || priceStr === 'Consultar') return 0;
  return parseFloat(priceStr.replace(/\./g, '').replace(',', '.')) || 0;
}

function formatPrice(value) {
  if (!value) return 'Consultar';
  return 'R$ ' + value.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function formatPriceUSD(brl) {
  if (!brl || brl < 1000) return '';
  return '≈ $' + Math.round(brl / USD_RATE).toLocaleString('en-US');
}

function normalizeLocation(loc) {
  if (!loc) return 'Unknown';
  return loc.charAt(0).toUpperCase() + loc.slice(1).toLowerCase();
}

function getTypeLabel(type) {
  const labels = {
    'sale': 'For Sale',
    'rental_seasonal': 'Seasonal',
    'rental_annual': 'Annual Rental',
    'unknown': 'Unknown'
  };
  return labels[type] || type;
}

function getBadgeClass(type) {
  return type === 'sale' ? 'badge-sale' : 'badge-rental';
}

// Populate filter options
function populateFilters() {
  const locations = new Set();
  const sources = new Set();
  
  LISTINGS.forEach(l => {
    if (l.location) locations.add(normalizeLocation(l.location));
    if (l.source) sources.add(l.source);
  });
  
  const locSelect = document.getElementById('filter-location');
  [...locations].sort().forEach(loc => {
    const opt = document.createElement('option');
    opt.value = loc.toLowerCase();
    opt.textContent = loc;
    locSelect.appendChild(opt);
  });
  
  const srcSelect = document.getElementById('filter-source');
  [...sources].sort().forEach(src => {
    const opt = document.createElement('option');
    opt.value = src;
    opt.textContent = src;
    srcSelect.appendChild(opt);
  });
}

function filterAndRender() {
  const typeFilter = document.getElementById('filter-type').value;
  const locFilter = document.getElementById('filter-location').value;
  const srcFilter = document.getElementById('filter-source').value;
  const bedsFilter = document.getElementById('filter-beds').value;
  const priceFilter = document.getElementById('filter-price').value;
  const sortBy = document.getElementById('sort-by').value;
  
  let filtered = LISTINGS.filter(l => {
    if (typeFilter !== 'all' && l.type !== typeFilter) return false;
    if (locFilter !== 'all' && normalizeLocation(l.location).toLowerCase() !== locFilter) return false;
    if (srcFilter !== 'all' && l.source !== srcFilter) return false;
    if (bedsFilter !== 'all' && (!l.bedrooms || l.bedrooms < parseInt(bedsFilter))) return false;
    if (priceFilter !== 'all') {
      const price = parsePrice(l.price);
      if (price === 0 || price > parseInt(priceFilter)) return false;
    }
    return true;
  });
  
  // Sort
  filtered.sort((a, b) => {
    const pa = parsePrice(a.price);
    const pb = parsePrice(b.price);
    if (sortBy === 'price-asc') return pa - pb;
    if (sortBy === 'price-desc') return pb - pa;
    if (sortBy === 'area-desc') return (b.area || 0) - (a.area || 0);
    return 0;
  });
  
  renderListings(filtered);
  document.getElementById('showing-count').textContent = filtered.length;
}

function renderListings(listings) {
  const grid = document.getElementById('listings-grid');
  grid.innerHTML = '';
  
  listings.forEach(l => {
    const price = parsePrice(l.price);
    const imgUrl = l.images && l.images.length > 0 ? l.images[0] : '';
    
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => { if (l.link) window.open(l.link, '_blank'); };
    
    card.innerHTML = `
      ${imgUrl ? 
        `<div class="card-img" style="background-image: url('${imgUrl}')">` :
        `<div class="no-img">🏠`
      }
        <div class="card-badge ${getBadgeClass(l.type)}">${getTypeLabel(l.type)}</div>
        <div class="card-source">${l.source}</div>
      </div>
      <div class="card-body">
        <div class="card-price">
          ${price > 0 ? formatPrice(price) : 'Preço sob consulta'}
          ${price > 1000 ? `<span class="card-price-usd">${formatPriceUSD(price)}</span>` : ''}
        </div>
        <div class="card-title">${l.title || l.propType || 'Property'} ${l.code ? `• Cód: ${l.code}` : ''}</div>
        <div class="card-features">
          ${l.bedrooms ? `<div class="feature"><span class="feature-icon">🛏</span> ${l.bedrooms} bed</div>` : ''}
          ${l.bathrooms ? `<div class="feature"><span class="feature-icon">🚿</span> ${l.bathrooms} bath</div>` : ''}
          ${l.area ? `<div class="feature"><span class="feature-icon">📐</span> ${l.area} m²</div>` : ''}
          ${l.parking ? `<div class="feature"><span class="feature-icon">🚗</span> ${l.parking}</div>` : ''}
        </div>
        <div class="card-location">📍 ${normalizeLocation(l.location) || 'Florianópolis'}</div>
      </div>
    `;
    
    grid.appendChild(card);
  });
}

// Init
populateFilters();
filterAndRender();

// Filter listeners
['filter-type', 'filter-location', 'filter-source', 'filter-beds', 'filter-price', 'sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('change', filterAndRender);
});
</script>
