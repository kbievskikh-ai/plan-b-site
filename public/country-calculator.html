<style>
:root{--burg:#6B1D3A;--burg-dark:#4A1228;--gold:#C9A94E;--gold-light:#D4B85A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf9f7;color:#2c2c2c;min-height:100vh}
.header{background:linear-gradient(135deg,var(--burg),var(--burg-dark));color:#fff;padding:18px 0;text-align:center;position:relative}
.lang-switch{position:absolute;top:12px;right:20px;display:flex;gap:4px}
.lang-btn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);font-size:11px;cursor:pointer;font-weight:600;transition:all .2s}
.lang-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:var(--gold)}
.header h1{font-family:'Playfair Display',serif;font-size:26px;margin:8px 0 4px}
.header p{font-size:12px;color:rgba(255,255,255,0.4)}
.container{max-width:700px;margin:25px auto;padding:0 20px;position:relative;z-index:1}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;opacity:.04;pointer-events:none;z-index:0;color:var(--burg)}
.progress-bar{background:#e8e8e8;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,var(--burg),var(--gold));height:100%;border-radius:20px;transition:width .5s}
.step-info{text-align:center;font-size:11px;color:#999;margin-bottom:12px}
.question-card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);margin-bottom:18px;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.question-card h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--burg);margin-bottom:5px}
.question-card .hint{font-size:11px;color:#999;margin-bottom:15px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:12px 16px;border:2px solid #eee;border-radius:12px;cursor:pointer;transition:all .2s;background:#fff}
.option:hover{border-color:var(--gold);background:rgba(201,169,78,.04)}
.option.selected{border-color:var(--burg);background:rgba(107,29,58,.04)}
.option .icon{font-size:20px;flex-shrink:0}
.option .text{flex:1}
.option .text .label{font-weight:600;font-size:13px}
.option .text .desc{font-size:10px;color:#888;margin-top:1px}
.option .check{width:20px;height:20px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.option.selected .check{background:var(--burg);border-color:var(--burg)}
.option.selected .check::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.multi-hint{font-size:10px;color:var(--gold);margin-bottom:8px;font-weight:600}
.options-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.option-chip{padding:9px 10px;border:2px solid #eee;border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;font-size:12px}
.option-chip:hover{border-color:var(--gold)}
.option-chip.selected{border-color:var(--burg);background:rgba(107,29,58,.06);font-weight:600}
.option-chip .chip-icon{font-size:18px;display:block;margin-bottom:3px}
.nav-buttons{display:flex;justify-content:space-between;margin-top:18px}
.btn{padding:11px 28px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-back{background:#f0f0f0;color:#666}
.btn-back:hover{background:#e0e0e0}
.btn-next{background:linear-gradient(135deg,var(--burg),var(--burg-dark));color:#fff}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(107,29,58,.3)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.hidden{display:none}
/* Results */
.results-card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);animation:fadeIn .5s}
.results-card h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--burg);margin-bottom:12px;text-align:center}
.result-item{border:2px solid #eee;border-radius:14px;padding:18px;margin:12px 0;transition:all .3s}
.result-item.top{border-color:var(--gold);background:linear-gradient(135deg,rgba(201,169,78,.03),rgba(107,29,58,.03))}
.result-item .rank{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.result-item .rank .medal{font-size:28px}
.result-item .rank .country-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--burg)}
.result-item .rank .score{font-size:14px;color:var(--gold);font-weight:700;margin-left:auto;background:rgba(201,169,78,.1);padding:3px 10px;border-radius:8px}
.result-item .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.result-item .tag{font-size:9px;padding:3px 7px;border-radius:6px;background:rgba(107,29,58,.06);color:var(--burg)}
.result-item .desc-text{font-size:11px;color:#666;line-height:1.5;margin-bottom:12px}
/* Infographic charts */
.charts-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.chart-item{text-align:center}
.chart-item .donut{width:60px;height:60px;margin:0 auto;position:relative}
.chart-item .donut svg{width:60px;height:60px;transform:rotate(-90deg)}
.chart-item .donut .center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:var(--burg)}
.chart-item .chart-label{font-size:8px;color:#888;margin-top:3px;line-height:1.2}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.info-pill{background:#f8f8f8;border-radius:8px;padding:8px 10px;font-size:10px;display:flex;align-items:center;gap:6px}
.info-pill .pill-icon{font-size:14px;flex-shrink:0}
.info-pill .pill-text{color:#555;line-height:1.3}
.info-pill strong{color:#333}
.cta-box{background:linear-gradient(135deg,var(--burg),var(--burg-dark));color:#fff;border-radius:14px;padding:20px;margin-top:20px;text-align:center}
.cta-box h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:6px}
.cta-box p{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:10px}
.cta-box .btn-cta{background:var(--gold);color:var(--burg-dark);padding:11px 28px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.cta-box .btn-cta:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,169,78,.4)}
.disclaimer{text-align:center;font-size:9px;color:#bbb;margin:18px 0;line-height:1.5}

let currentQuestion = 0, answers = {};

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.getElementById('headerTitle').textContent = t[lang].headerTitle;
  document.getElementById('headerSub').textContent = t[lang].headerSub;
  if (!document.getElementById('results').classList.contains('hidden')) showResults();
  else renderQuestion();
}

function renderQuestion() {
  const q = Q[lang][currentQuestion];
  const container = document.getElementById('questionContainer');
  const progress = ((currentQuestion) / Q[lang].length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('stepInfo').textContent = `${t[lang].question} ${currentQuestion + 1} ${t[lang].stepOf} ${Q[lang].length}`;
  document.getElementById('btnBack').classList.toggle('hidden', currentQuestion === 0);
  document.getElementById('btnBack').textContent = t[lang].back;
  document.getElementById('btnNext').textContent = currentQuestion === Q[lang].length - 1 ? t[lang].showResult : t[lang].next;
  let html = `<div class="question-card"><h2>${q.title}</h2>`;
  if (q.hint) html += `<div class="hint">${q.hint}</div>`;
  if (q.type === 'multi') {
    html += `<div class="multi-hint">${q.hint || ''}</div><div class="options-grid">`;
    q.options.forEach(o => {
      const sel = answers[q.id]&&answers[q.id].includes(o.value)?'selected':'';
      html += `<div class="option-chip ${sel}" onclick="toggleMulti('${q.id}','${o.value}',${q.max},this)"><span class="chip-icon">${o.icon}</span>${o.label}</div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="options">';
    q.options.forEach(o => {
      const sel = answers[q.id]===o.value?'selected':'';
      html += `<div class="option ${sel}" onclick="selectOption('${q.id}','${o.value}',this)"><div class="icon">${o.icon}</div><div class="text"><div class="label">${o.label}</div>${o.desc?'<div class="desc">'+o.desc+'</div>':''}</div><div class="check"></div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
  updateNextButton();
}

function selectOption(qId, value, el) { answers[qId]=value; el.parentElement.querySelectorAll('.option').forEach(o=>o.classList.remove('selected')); el.classList.add('selected'); updateNextButton(); }
function toggleMulti(qId, value, max, el) { if(!answers[qId])answers[qId]=[]; const i=answers[qId].indexOf(value); if(i>-1){answers[qId].splice(i,1);el.classList.remove('selected')} else if(answers[qId].length<max){answers[qId].push(value);el.classList.add('selected')} updateNextButton(); }
function updateNextButton() { const q=Q[lang][currentQuestion]; const btn=document.getElementById('btnNext'); if(q.type==='multi')btn.disabled=!answers[q.id]||answers[q.id].length===0; else btn.disabled=!answers[q.id]; }
function nextQuestion() { if(currentQuestion<Q[lang].length-1){currentQuestion++;renderQuestion()}else showResults(); }
function prevQuestion() { if(currentQuestion>0){currentQuestion--;renderQuestion()} }

function calculateScores() {
  return countries.map(c => {
    let score=0,max=0;
    const clim=c.climate.includes(answers.climate)||answers.climate==='ANY'; score+=clim?15:3; max+=15;
    const bud=c.budget.includes(answers.budget); score+=bud?10:2; max+=10;
    if(answers.priorities)answers.priorities.forEach(p=>{score+=c.priorities[p]||0;max+=10});
    score+=(c.occupation[answers.occupation]||5)*1.5; max+=15;
    score+=(c.goal[answers.goal]||5)*1.5; max+=15;
    score+=c.family[answers.family]||5; max+=10;
    if(['RU','BY','UA','KZ'].includes(answers.citizenship)&&['Бразилия (Флорианополис)','Уругвай','Турция','ОАЭ (Дубай)','Аргентина'].includes(c.name.ru))score+=3;
    if(answers.goal==='BIRTH'){score+=(c.priorities.BIRTH||0)*2;max+=20}
    if(answers.family==='PREGNANT'){score+=(c.priorities.BIRTH||0)*2;max+=20}
    return{...c,score:Math.min(99,Math.round((score/max)*100))};
  }).sort((a,b)=>b.score-a.score);
}

function donut(pct, color) {
  const r=25,c=2*Math.PI*r,d=c*(1-pct/100);
  return `<div class="donut"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="${r}" fill="none" stroke="#eee" stroke-width="6"/><circle cx="30" cy="30" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-dasharray="${c}" stroke-dashoffset="${d}" stroke-linecap="round"/></svg><div class="center-text">${pct}%</div></div>`;
}

function showResults() {
  document.getElementById('quiz').classList.add('hidden');
  const res=document.getElementById('results'); res.classList.remove('hidden');
  const scored=calculateScores().slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const colors=['#D4AF37','#A0A0A0','#CD7F32'];
  const L=t[lang];
  let html=`<div class="results-card"><h2>${L.top3}</h2><p style="text-align:center;font-size:11px;color:#888;margin-bottom:14px">${L.top3sub}</p>`;

  scored.forEach((c,i)=>{
    const inf=c.info[lang];
    html+=`<div class="result-item ${i===0?'top':''}">
      <div class="rank"><span class="medal">${medals[i]}</span><span class="country-name">${c.flag} ${c.name[lang]}</span><span class="score">${c.score}% ${L.match}</span></div>
      <div class="tags">${c.tags[lang].map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="desc-text">${c.desc[lang]}</div>
      <div class="charts-row">
        <div class="chart-item">${donut(c.scores.safety,'#2E7D32')}<div class="chart-label">${L.safety}</div></div>
        <div class="chart-item">${donut(c.scores.cost,'#1565C0')}<div class="chart-label">${L.costLiving}</div></div>
        <div class="chart-item">${donut(c.scores.rental,'#E65100')}<div class="chart-label">${L.rental}</div></div>
        <div class="chart-item">${donut(c.scores.lifestyle,'#6B1D3A')}<div class="chart-label">${L.lifestyle}</div></div>
      </div>
      <div class="info-row">
        <div class="info-pill"><span class="pill-icon">📋</span><span class="pill-text"><strong>${inf.residency}</strong></span></div>
        <div class="info-pill"><span class="pill-icon">🛂</span><span class="pill-text"><strong>${inf.passport}</strong></span></div>
        <div class="info-pill"><span class="pill-icon">💰</span><span class="pill-text"><strong>${inf.tax}</strong></span></div>
        <div class="info-pill"><span class="pill-icon">📈</span><span class="pill-text"><strong>${inf.growth}</strong></span></div>
        ${inf.birth?`<div class="info-pill" style="grid-column:span 2"><span class="pill-icon">👶</span><span class="pill-text"><strong>${inf.birth}</strong></span></div>`:''}
      </div>
    </div>`;
